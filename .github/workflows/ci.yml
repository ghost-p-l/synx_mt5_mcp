name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Generate lock file
        run: uv lock

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/

      - name: Type check
        run: uv run mypy src/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --cov=src/synx_mt5 --cov-report=xml --cov-fail-under=25

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Integration tests
        run: uv run pytest tests/integration/ -v --ignore=tests/integration/test_ea_bridge.py || true

  adversarial-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Adversarial tests
        run: uv run pytest tests/adversarial/ -v

  lint-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint all
        run: uv run ruff check src/

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run security audit
        run: |
          pip-audit || echo "Security audit completed with warnings"

  status-check:
    needs: [lint-and-typecheck, unit-tests, integration-tests, adversarial-tests, security-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        run: echo "✅ All CI checks passed"
